<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalaIsda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius&family=Graduate&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link rel="icon" type="image/x-icon" href="/assets/talaisda.png">
  <link rel="stylesheet" href="/styles/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<label class="switch">
    <input type="checkbox" id="darkModeToggle" class="input">
    <span class="slider"></span>
    <span class="sun">
        <svg viewBox="0 0 24 24" fill="#E8E8E8">
            <g stroke-linecap="round" stroke-width="2" stroke="#e8e8e8">
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </g>
            <circle cx="12" cy="12" r="5" fill="#e8e8e8"></circle>
        </svg>
    </span>
    <span class="moon">
        <svg viewBox="0 0 24 24" fill="#73C0FC">
            <path d="M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z"></path>
        </svg>
    </span>
</label>
<body>
  <div class="container">
    <div class="panel" data-aos="fade-up">
      <!-- Uiverse-style animated text inside the panel -->
      <div class="loader small">
        <span>TalaIsda</span>
        <span>TalaIsda</span>
      </div>

      <div class="hero-content">
        <h2>Welcome, Admin!</h2>

        <form class="discovery-form" onsubmit="return validateLogin()">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="username" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password" />
          </div>

          <button type="submit" class="submit-btn">Login</button>
        </form>

        <p id="error-message"></p>

        <button class="back-btn" onclick="window.location.href='index.html'">
          <i class="fas fa-arrow-left"></i> Back
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="/scripts/script.js"></script>   <script></script>
  <script>
    AOS.init();

    function validateLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("error-message");

      if (username === "admin" && password === "admin") {
        window.location.href = "/pages/admindashboard.html"; // redirect to your admin page
        return false; // prevent form from submitting normally
      } else {
        error.textContent = "Incorrect username or password.";
        return false;
      }
    }
  </script>
</body>
</html>
