<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalaIsda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius&family=Graduate&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link rel="icon" type="image/x-icon" href="/assets/talaisda.png">
  <link rel="stylesheet" href="/styles/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container">
    <div class="panel" data-aos="fade-up">
      <!-- Uiverse-style animated text inside the panel -->
      <div class="loader small">
        <span>TalaIsda</span>
        <span>TalaIsda</span>
      </div>

      <div class="hero-content">
        <h2>Welcome Admin</h2>
        <p>Please enter your credentials to access the admin panel.</p>

        <form class="discovery-form" onsubmit="return validateLogin()">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="username" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password" />
          </div>

          <button type="submit" class="submit-btn">Login</button>
        </form>

        <p id="error-message"></p>

        <button class="back-btn" onclick="window.location.href='index.html'">
          <i class="fas fa-arrow-left"></i> Back
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();

    function validateLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("error-message");

      if (username === "admin" && password === "admin") {
        window.location.href = "admin-dashboard.html";
        return false;
      } else {
        error.textContent = "Incorrect username or password.";
        return false;
      }
    }
  </script>
</body>
</html>
