<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Add Your Discovery - TalaIsda</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Delius&family=Graduate&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">    
	<link rel="icon" type="image/x-icon" href="/assets/talaisda.png">
	<link rel="stylesheet" href="/styles/dashboard.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <div class="container">

    <header>
      <h1>Manage Users Discoveries</h1>
      <label class="switch">
    <input type="checkbox" id="darkModeToggle" class="input">
    <span class="slider"></span>
    <span class="sun">
        <svg viewBox="0 0 24 24" fill="#E8E8E8">
            <g stroke-linecap="round" stroke-width="2" stroke="#e8e8e8">
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </g>
            <circle cx="12" cy="12" r="5" fill="#e8e8e8"></circle>
        </svg>
    </span>
    <span class="moon">
        <svg viewBox="0 0 24 24" fill="#73C0FC">
            <path d="M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z"></path>
        </svg>
    </span>
</label>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>
    <table>
      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Fish Name</th>
          <th>Scientific Name</th>
          <th>Location</th>
          <th>Description</th>
          <th>Photo</th>
          <th>Additional Info</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="discoveries-table-body"></tbody>
    </table>

  </div>
<script src="/scripts/script.js"></script>
<script>
  async function fetchSubmissions() {
    try {
      const res = await fetch('http://localhost:3000/api/admin/submissions');
      const data = await res.json();
      renderDiscoveries(data);
    } catch (err) {
      console.error('Error fetching submissions:', err);
    }
  }

 async function deleteDiscovery(submissionId) {
  if (confirm('Are you sure you want to delete this submission?')) {
    try {
      const res = await fetch(`http://localhost:3000/api/admin/submissions/${submissionId}`, {
        method: 'DELETE'
      });

      if (res.ok) {
        alert('Submission deleted successfully!');
        fetchSubmissions(); // Refresh only the table
      } else {
        alert('Failed to delete submission.');
      }
    } catch (err) {
      console.error('Error deleting submission:', err);
    }
  }
}



  function renderDiscoveries(data) {
    const tbody = document.getElementById('discoveries-table-body');
    tbody.innerHTML = '';

    data.forEach(d => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${d.FirstName}</td>
        <td>${d.LastName}</td>
        <td>${d.Email}</td>
        <td>${d.FishName}</td>
        <td>${d.ScientificName}</td>
        <td>${d.Location}</td>
        <td>${d.Description}</td>
        <td><a href="${d.ImagePath}" target="_blank"><img src="${d.ImagePath}" width="80"/></a></td>
        <td>${d.AdditionalInfo || '—'}</td>
        <td>
          <button onclick="deleteDiscovery(${d.SubmissionID})" class="delete-btn"><i class="fas fa-trash-alt"></i> Delete</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function logout() {
    window.location.href = 'admin.html';
  }

  fetchSubmissions();
</script>


</body>
</html>
