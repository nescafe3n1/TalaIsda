<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Add Your Discovery - TalaIsda</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Delius&family=Graduate&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">    
	<link rel="icon" type="image/x-icon" href="/assets/talaisda.png">
	<link rel="stylesheet" href="/styles/dashboard.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <div class="container">

    <header>
      <h1>Manage Users Discoveries</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <table>
      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Fish Name</th>
          <th>Scientific Name</th>
          <th>Location</th>
          <th>Description</th>
          <th>Photo</th>
          <th>Additional Info</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="discoveries-table-body"></tbody>
    </table>

  </div>

<script>
  async function fetchSubmissions() {
    try {
      const res = await fetch('http://localhost:3000/api/admin/submissions');
      const data = await res.json();
      renderDiscoveries(data);
    } catch (err) {
      console.error('Error fetching submissions:', err);
    }
  }

 async function deleteDiscovery(submissionId) {
  if (confirm('Are you sure you want to delete this submission?')) {
    try {
      const res = await fetch(`http://localhost:3000/api/admin/submissions/${submissionId}`, {
        method: 'DELETE'
      });

      if (res.ok) {
        alert('Submission deleted successfully!');
        fetchSubmissions(); // Refresh only the table
      } else {
        alert('Failed to delete submission.');
      }
    } catch (err) {
      console.error('Error deleting submission:', err);
    }
  }
}



  function renderDiscoveries(data) {
    const tbody = document.getElementById('discoveries-table-body');
    tbody.innerHTML = '';

    data.forEach(d => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${d.FirstName}</td>
        <td>${d.LastName}</td>
        <td>${d.Email}</td>
        <td>${d.FishName}</td>
        <td>${d.ScientificName}</td>
        <td>${d.Location}</td>
        <td>${d.Description}</td>
        <td><a href="${d.ImagePath}" target="_blank"><img src="${d.ImagePath}" width="80"/></a></td>
        <td>${d.AdditionalInfo || '—'}</td>
        <td>
          <button onclick="deleteDiscovery(${d.SubmissionID})" class="delete-btn"><i class="fas fa-trash-alt"></i> Delete</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function logout() {
    window.location.href = 'admin.html';
  }

  fetchSubmissions();
</script>


</body>
</html>
